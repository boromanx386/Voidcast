    <title>// VOIDCAST // Neural Interface Terminal</title>
    
    <style>
      /* Pre-load critical styles to prevent FOUC */
      html, body, #root {
        height: 100%;
        margin: 0;
        padding: 0;
        background-color: #0a0a0f;
        color: #e8e8f0;
        font-family: 'Rajdhani', 'Inter', system-ui, sans-serif;
      }
      
      /* Loading screen */
      #root:empty::after {
        content: 'INITIALIZING NEURAL INTERFACE...';
        position: fixed;
        inset: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        font-family: 'JetBrains Mono', monospace;
        font-size: 14px;
        letter-spacing: 0.2em;
        color: #00f5ff;
        text-shadow: 0 0 10px #00f5ff, 0 0 20px #00f5ff;
        animation: boot-text 1s ease-in-out infinite;
      }
      
      @keyframes boot-text {
        0%, 100% { opacity: 0.5; }
        50% { opacity: 1; }
      }
    </style>
